naftiko: 1.0.0-alpha2
info:
  label: Zestful — Parse
  description: 'Zestful — Parse. 1 operations. Lead operation: Parse a List of Raw Ingredient Strings. Self-contained Naftiko
    capability covering one Zestful business surface.'
  tags:
  - Zestful
  - Parse
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZESTFUL_API_KEY: ZESTFUL_API_KEY
capability:
  consumes:
  - type: http
    namespace: zestful-parse
    baseUri: https://zestfuldata.com
    description: Zestful — Parse business capability. Self-contained, no shared references.
    resources:
    - name: parseIngredients
      path: /parseIngredients
      operations:
      - name: parseingredients
        method: POST
        description: Parse a List of Raw Ingredient Strings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Api-Key
      value: '{{env.ZESTFUL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: zestful-parse-rest
    port: 8080
    description: REST adapter for Zestful — Parse. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/parseingredients
      name: parseingredients
      description: REST surface for parseIngredients.
      operations:
      - method: POST
        name: parseingredients
        description: Parse a List of Raw Ingredient Strings
        call: zestful-parse.parseingredients
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: zestful-parse-mcp
    port: 9090
    transport: http
    description: MCP adapter for Zestful — Parse. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: parse-list-raw-ingredient-strings
      description: Parse a List of Raw Ingredient Strings
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: zestful-parse.parseingredients
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
