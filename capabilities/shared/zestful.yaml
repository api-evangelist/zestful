naftiko: "1.0.0-alpha1"

info:
  label: "Zestful Ingredient Parser API"
  description: >-
    Machine-learning-powered ingredient parser that converts plain recipe
    ingredient strings into structured JSON data with quantity, unit, product,
    preparation notes, and USDA FoodData Central database matches.
  tags:
    - Food
    - Ingredients
    - Parsers
    - Recipes
    - USDA
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      ZESTFUL_API_KEY: ZESTFUL_API_KEY

capability:
  consumes:
    - type: http
      namespace: zestful
      baseUri: https://zestfuldata.com
      description: >-
        Zestful ingredient parser API that extracts structured data from
        free-form recipe ingredient text.
      authentication:
        type: apikey
        key: X-Api-Key
        value: "{{ZESTFUL_API_KEY}}"
        placement: header
      resources:
        - name: ingredients
          path: /parseIngredients
          description: Parse raw ingredient strings into structured JSON
          operations:
            - name: parse-ingredients
              method: POST
              description: >-
                Parse a list of raw ingredient strings into structured data
                including quantity, unit, product name, preparation notes,
                and USDA nutritional database matches.
              outputRawFormat: json
              outputParameters:
                - name: results
                  type: array
                  value: "$.results"
                - name: requestsRemaining
                  type: integer
                  value: "$.requestsRemaining"
              body:
                type: json
                data:
                  ingredients: "{{tools.ingredients}}"

  exposes:
    - type: rest
      port: 8100
      namespace: zestful-api
      resources:
        - path: /v1/ingredients/parse
          name: ingredient-parser
          description: Parse raw recipe ingredient strings
          operations:
            - method: POST
              name: parse-ingredients
              description: Parse a list of raw ingredient strings into structured JSON
              call: "zestful.parse-ingredients"
              with:
                ingredients: "rest.ingredients"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: zestful-mcp
      transport: http
      tools:
        - name: parse-ingredients
          description: >-
            Parse a list of raw recipe ingredient strings into structured JSON
            data including quantity, unit, product name, preparation notes,
            and USDA FoodData Central matches.
          hints:
            readOnly: false
            openWorld: true
          call: "zestful.parse-ingredients"
          with:
            ingredients: "tools.ingredients"
          outputParameters:
            - type: object
              mapping: "$."
